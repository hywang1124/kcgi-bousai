spring.application.name=bousai

# Actuator: ヘルスチェックのみ公開
management.endpoints.web.exposure.include=health

# CORS 許可オリジン（カンマ区切り）。本番は環境変数 APP_CORS_ALLOWED_ORIGINS で
# GitHub Pages のドメインを指定する。既定はローカル開発の Vite。
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# Spring AI: Claude(Anthropic)。キー未設定時はモック実装が使われる（AiAssistantConfig 参照）。
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY:}
spring.ai.anthropic.chat.options.model=claude-opus-4-8
spring.ai.anthropic.chat.options.max-tokens=4096
