spring.application.name=bousai

# デフォルトプロファイル（明示指定が無ければ dev で起動）
spring.profiles.default=dev

# Actuator: ヘルスチェック / 情報エンドポイントのみ公開
management.endpoints.web.exposure.include=health,info

# Flyway: {vendor} プレースホルダで方言別ディレクトリを自動選択
#   dev(SQLite)      -> db/migration/sqlite
#   prod(PostgreSQL) -> db/migration/postgresql
spring.flyway.locations=classpath:db/migration/{vendor}
