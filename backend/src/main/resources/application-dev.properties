# =========================================================
# dev プロファイル: SQLite（ファイル DB・ゼロ設定）
# =========================================================
server.port=8080

# --- データソース (SQLite) ---
spring.datasource.url=jdbc:sqlite:./data/bousai.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# --- JPA / Hibernate ---
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
# スキーマは Flyway に一本化。
# SQLite は動的型付けのため Hibernate の列型 validate が誤検知する
# （例: INTEGER PRIMARY KEY AUTOINCREMENT を BIGINT と不一致と判定）。
# よって dev では none。整合性検証は prod(PostgreSQL) 側の validate に委ねる。
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.show-sql=true

# --- Flyway ---
spring.flyway.enabled=true

# --- Actuator (dev) ---
management.endpoint.health.show-details=always
