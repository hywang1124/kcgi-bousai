# =========================================================
# dev プロファイル: SQLite（ファイル DB・ゼロ設定）
# =========================================================
server.port=8080

# --- データソース (SQLite) ---
spring.datasource.url=jdbc:sqlite:./data/bousai.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# --- JPA / Hibernate ---
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
# スキーマは Flyway に一本化。
# SQLite は動的型付けのため Hibernate の列型 validate が誤検知する
# （例: INTEGER PRIMARY KEY AUTOINCREMENT を BIGINT と不一致と判定）。
# よって dev では none。整合性検証は prod(PostgreSQL) 側の validate に委ねる。
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.show-sql=true

# --- Flyway ---
spring.flyway.enabled=true

# --- Actuator (dev) ---
management.endpoint.health.show-details=always

# --- 認証 (dev 専用。本番は環境変数で必ず上書きすること) ---
# HS256 用に 32 バイト以上の固定鍵（dev のみ。git に置く本番鍵は厳禁）
app.jwt.secret=dev-only-secret-change-me-please-0123456789abcdef
app.admin.default-password=admin12345
